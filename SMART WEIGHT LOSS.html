<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Weight Loss Planner</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa, #d7e1ec);
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.1);
    }

    .header {
      background: linear-gradient(135deg, #1d976c, #2c3e50);
      color: white;
      padding: 35px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .content {
      padding: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      margin-bottom: 8px;
    }

    input, select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      background: linear-gradient(135deg, #1d976c, #2c3e50);
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .switcher {
      display: flex;
      gap: 15px;
      margin: 25px 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      flex: 1;
      min-width: 200px;
      background: #ececec;
      color: #222;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #1d976c, #2c3e50);
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin: 25px 0;
    }

    .card {
      background: #f9fbfc;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.06);
    }

    .card h3 {
      margin-bottom: 12px;
      color: #1d976c;
    }

    .big-number {
      font-size: 2rem;
      font-weight: bold;
    }

    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.06);
    }

    .tips {
      margin-top: 25px;
      display: grid;
      gap: 14px;
    }

    .tip-item {
      background: #f5fffa;
      padding: 16px;
      border-left: 5px solid #1d976c;
      border-radius: 10px;
    }

    .recommendation-box {
      background: #f9fbfc;
      padding: 25px;
      border-radius: 20px;
      margin-top: 20px;
    }

    .print-btn {
      margin-top: 20px;
      width: 100%;
    }

    .macro-box {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
    }

    .macro {
      flex: 1;
      min-width: 180px;
      background: #eef7f3;
      padding: 18px;
      border-radius: 14px;
      text-align: center;
    }

    .macro h4 {
      margin-bottom: 10px;
      color: #1d976c;
    }

    @media print {
      body {
        background: white;
      }

      button {
        display: none;
      }

      .container {
        box-shadow: none;
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .content {
        padding: 18px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Smart Weight Loss Planner</h1>
    <p>Personalized Weight Loss, Nutrition & Lifestyle Recommendation System</p>
  </div>

  <div class="content">

    <div class="form-grid">
      <div class="form-group">
        <label>Current Weight (kg)</label>
        <input type="number" id="currentWeight" placeholder="Enter current weight">
      </div>

      <div class="form-group">
        <label>Goal Weight (kg)</label>
        <input type="number" id="goalWeight" placeholder="Enter goal weight">
      </div>

      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="Enter height">
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="Enter age">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label>Lifestyle</label>
        <select id="lifestyle">
          <option value="1.2">Sedentary</option>
          <option value="1.375">Light Active</option>
          <option value="1.55">Moderate</option>
          <option value="1.725">Very Active</option>
        </select>
      </div>
    </div>

    <button onclick="generatePlan()">Generate Weight Loss Plan</button>

    <div class="switcher">
      <button class="tab-btn active" onclick="switchTab('results')">Your Results</button>
      <button class="tab-btn" onclick="switchTab('recommendation')">App Recommendation</button>
    </div>

    <div id="results" class="tab-content active">

      <div class="card-grid">
        <div class="card">
          <h3>BMI</h3>
          <div class="big-number" id="bmiResult">0</div>
        </div>

        <div class="card">
          <h3>Target Calories</h3>
          <div class="big-number" id="calorieResult">0</div>
        </div>

        <div class="card">
          <h3>Estimated Goal Date</h3>
          <div class="big-number" id="goalDate">--</div>
        </div>

        <div class="card">
          <h3>Weekly Loss</h3>
          <div class="big-number">0.5 - 1kg</div>
        </div>
      </div>

      <div class="chart-box">
        <canvas id="weightChart"></canvas>
      </div>

      <div class="macro-box">
        <div class="macro">
          <h4>Protein</h4>
          <p id="proteinSplit">0g</p>
        </div>

        <div class="macro">
          <h4>Carbohydrates</h4>
          <p id="carbSplit">0g</p>
        </div>

        <div class="macro">
          <h4>Healthy Fats</h4>
          <p id="fatSplit">0g</p>
        </div>
      </div>

      <div class="tips" id="tipsContainer"></div>

      <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    </div>

    <div id="recommendation" class="tab-content">
      <div class="recommendation-box" id="recommendationText">
        Your personalized recommendation will appear here.
      </div>
    </div>

  </div>
</div>

<script>

let chart;

const allTips = {
  overweight: [
    "Sleep at least 7-8 hours daily for better metabolism.",
    "Avoid sugary drinks and reduce processed foods.",
    "Walk 8,000 to 10,000 steps daily.",
    "Drink 3 liters of water every day.",
    "Practice stress management through meditation.",
    "Eat more protein-rich foods for fullness.",
    "Avoid eating late at night.",
    "Limit fast food to once per week.",
    "Track your calories consistently.",
    "Do strength training 3 times weekly."
  ],

  moderate: [
    "Maintain consistent meal timing.",
    "Aim for 7 hours of quality sleep.",
    "Reduce junk food gradually.",
    "Add more vegetables to meals.",
    "Practice mindful eating habits.",
    "Avoid emotional eating.",
    "Include cardio exercise 4 times weekly.",
    "Drink enough water before meals.",
    "Reduce stress through hobbies.",
    "Maintain healthy posture and mobility."
  ],

  healthy: [
    "Focus on maintaining your healthy lifestyle.",
    "Continue regular physical activity.",
    "Avoid excessive sugar intake.",
    "Keep stress levels under control.",
    "Prioritize recovery and sleep.",
    "Maintain balanced nutrient intake.",
    "Stay hydrated throughout the day.",
    "Practice portion control.",
    "Limit highly processed foods.",
    "Regular health checkups are recommended."
  ]
};

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
  });

  document.querySelectorAll('.tab-btn').forEach(el => {
    el.classList.remove('active');
  });

  document.getElementById(tab).classList.add('active');

  event.target.classList.add('active');
}

function generatePlan() {

  const weight = parseFloat(document.getElementById('currentWeight').value);
  const goalWeight = parseFloat(document.getElementById('goalWeight').value);
  const height = parseFloat(document.getElementById('height').value);
  const age = parseFloat(document.getElementById('age').value);
  const gender = document.getElementById('gender').value;
  const lifestyle = parseFloat(document.getElementById('lifestyle').value);

  if(!weight || !goalWeight || !height || !age) {
    alert('Please fill all details');
    return;
  }

  const bmi = (weight / ((height / 100) ** 2)).toFixed(1);

  let bmr;

  if(gender === 'male') {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }

  const maintenanceCalories = bmr * lifestyle;
  const targetCalories = Math.round(maintenanceCalories - 500);

  const protein = Math.round((targetCalories * 0.30) / 4);
  const carbs = Math.round((targetCalories * 0.40) / 4);
  const fats = Math.round((targetCalories * 0.30) / 9);

  const weightDifference = weight - goalWeight;
  const estimatedWeeks = Math.ceil(weightDifference / 0.75);

  const futureDate = new Date();
  futureDate.setDate(futureDate.getDate() + (estimatedWeeks * 7));

  document.getElementById('bmiResult').innerText = bmi;
  document.getElementById('calorieResult').innerText = targetCalories + ' kcal';
  document.getElementById('goalDate').innerText = futureDate.toDateString();

  document.getElementById('proteinSplit').innerText = protein + 'g daily';
  document.getElementById('carbSplit').innerText = carbs + 'g daily';
  document.getElementById('fatSplit').innerText = fats + 'g daily';

  let category;

  if(bmi >= 30) {
    category = 'overweight';
  } else if(bmi >= 25) {
    category = 'moderate';
  } else {
    category = 'healthy';
  }

  const tipsContainer = document.getElementById('tipsContainer');
  tipsContainer.innerHTML = '';

  allTips[category].forEach((tip, index) => {
    tipsContainer.innerHTML += `
      <div class="tip-item">
        <strong>Tip ${index + 1}:</strong> ${tip}
      </div>
    `;
  });

  const recommendationText = `
    <h2>Safe Weight Loss Recommendation</h2>
    <br>
    <p><strong>Current BMI:</strong> ${bmi}</p>
    <br>
    <p>Your recommended target should focus on gradual and sustainable fat loss rather than aggressive dieting.</p>
    <br>
    <p>The app recommends losing approximately <strong>0.5kg to 1kg per week</strong> for healthy long-term results.</p>
    <br>
    <p>Based on your current condition, your estimated safe calorie intake is <strong>${targetCalories} kcal/day</strong>.</p>
    <br>
    <p>You should prioritize:</p>
    <ul style="padding-left:20px; margin-top:10px; line-height:1.8;">
      <li>High protein intake</li>
      <li>Daily movement and walking</li>
      <li>Quality sleep</li>
      <li>Stress reduction</li>
      <li>Reducing added sugars</li>
      <li>Consistent hydration</li>
    </ul>
    <br>
    <p><strong>Estimated healthy completion date:</strong> ${futureDate.toDateString()}</p>
  `;

  document.getElementById('recommendationText').innerHTML = recommendationText;

  createChart(weight, goalWeight, estimatedWeeks);
}

function createChart(currentWeight, goalWeight, weeks) {

  const labels = [];
  const data = [];

  const lossPerWeek = (currentWeight - goalWeight) / weeks;

  for(let i = 0; i <= weeks; i++) {
    labels.push('Week ' + i);
    data.push((currentWeight - (lossPerWeek * i)).toFixed(1));
  }

  const ctx = document.getElementById('weightChart').getContext('2d');

  if(chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Estimated Weight Progress',
        data: data,
        borderWidth: 3,
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true
        }
      },
      scales: {
        y: {
          beginAtZero: false
        }
      }
    }
  });
}

</script>

</body>
</html>
